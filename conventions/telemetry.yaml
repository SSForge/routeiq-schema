# RouteIQ OTel Semantic Conventions — Phase 1 (telemetry namespace)
# Format: ConventionRegistry proto shape (see proto/routeiq/v1/telemetry/conventions.proto)
# Every AgentEvent field emitted on the wire must have a row here.

