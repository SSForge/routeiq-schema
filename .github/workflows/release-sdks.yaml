name: release-sdks

# Runs automatically when sdk-tests passes on main, or manually.
# Pushes each generated out/<lang>/ tree to its dedicated public SDK repo.
# Requires secret: SDK_PUSH_TOKEN — a GitHub PAT (classic) with repo scope
# on SSForge/routeiq-sdk-{go,python,typescript,ruby,rust,csharp,java}.
# TypeScript SDK is also published to GitHub Packages as @ssforge/routeiq-sdk
# using the built-in GITHUB_TOKEN — no extra secrets required.

on:
  workflow_run:
    workflows: ["sdk-tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional semver tag to apply to each SDK repo (e.g. v0.1.0)"
        required: false

jobs:
  push-sdk:
    name: Release ${{ matrix.lang }} SDK
    # Skip if triggered via workflow_run but tests didn't pass.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: go
            src: out/go
            sdk: sdk/go
            repo: SSForge/routeiq-sdk-go
          - lang: python
            src: out/python
            sdk: sdk/python
            repo: SSForge/routeiq-sdk-python
          - lang: typescript
            src: out/typescript
            sdk: sdk/typescript
            repo: SSForge/routeiq-sdk-typescript
          - lang: ruby
            src: out/ruby
            sdk: sdk/ruby
            repo: SSForge/routeiq-sdk-ruby
          - lang: rust
            src: out/rust
            sdk: sdk/rust
            repo: SSForge/routeiq-sdk-rust
          - lang: csharp
            src: out/csharp
            sdk: sdk/csharp
            repo: SSForge/routeiq-sdk-csharp
          - lang: java
            src: out/java
            sdk: sdk/java
            repo: SSForge/routeiq-sdk-java

    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "routeiq-bot"
          git config --global user.email "bot@ssforge.io"

      - name: Clone SDK repo
        env:
          PUSH_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
          SDK_REPO: ${{ matrix.repo }}
        run: |
          git clone \
            "https://x-access-token:${PUSH_TOKEN}@github.com/${SDK_REPO}.git" \
            /tmp/sdk

      - name: Sync generated files
        env:
          SDK_SRC: ${{ matrix.src }}
          SDK_LAYER: ${{ matrix.sdk }}
        run: |
          # Preserve files the SDK repo owns (manifests, README, .gitignore).
          # pyproject.toml is NOT preserved for languages that supply sdk/ — it
          # comes from sdk/<lang>/pyproject.toml and is the source of truth.
          find /tmp/sdk -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name 'README.md' \
            ! -name 'go.mod' \
            ! -name 'go.sum' \
            ! -name 'package.json' \
            ! -name 'Cargo.toml' \
            ! -name 'Gemfile' \
            ! -name '.gitignore' \
            $( [ -z "${SDK_LAYER}" ] && echo "! -name pyproject.toml" ) \
            -exec rm -rf {} +

          # Copy generated wire layer
          cp -r "${SDK_SRC}/." /tmp/sdk/

          # Copy hand-written developer layer (if this language has one)
          if [ -n "${SDK_LAYER}" ] && [ -d "${SDK_LAYER}" ]; then
            cp -r "${SDK_LAYER}/." /tmp/sdk/
          fi

      - name: Commit and push
        env:
          PUSH_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
          SDK_REPO: ${{ matrix.repo }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cd /tmp/sdk
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — SDK already up to date."
            exit 0
          fi
          git commit -m "chore: sync from routeiq-schema@${COMMIT_SHA:0:8}"
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${SDK_REPO}.git" main

      - name: Tag release
        if: >
          (github.event_name == 'workflow_dispatch' && inputs.tag != '') ||
          startsWith(github.ref, 'refs/tags/v')
        env:
          PUSH_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
          SDK_REPO: ${{ matrix.repo }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          cd /tmp/sdk
          git tag "$RELEASE_TAG" 2>/dev/null || echo "Tag $RELEASE_TAG already exists, skipping."
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${SDK_REPO}.git" "$RELEASE_TAG" || true

      - name: Set up Node.js for GitHub Packages
        if: matrix.lang == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ssforge"

      - name: Build and publish to GitHub Packages
        if: matrix.lang == 'typescript'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
        run: |
          cd /tmp/sdk
          npm ci
          npm run build
          npm publish

      - name: Update forge-app vendor tarball
        if: matrix.lang == 'typescript'
        env:
          FORGE_TOKEN: ${{ secrets.FORGE_APP_TOKEN }}
        run: |
          VERSION=$(node -p "require('/tmp/sdk/package.json').version")
          TARBALL="ssforge-routeiq-sdk-${VERSION}.tgz"

          # Pack from the already-built SDK
          cd /tmp/sdk && npm pack --pack-destination /tmp/

          # Clone forge-app
          git clone \
            "https://x-access-token:${FORGE_TOKEN}@github.com/SSForge/forge-app.git" \
            /tmp/forge-app

          # Swap vendor tarball
          rm -f /tmp/forge-app/shared/vendor/ssforge-routeiq-sdk-*.tgz
          cp "/tmp/${TARBALL}" /tmp/forge-app/shared/vendor/

          # Update shared/package.json to reference the new tarball path
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('/tmp/forge-app/shared/package.json'));
            pkg.dependencies['@ssforge/routeiq-sdk'] = 'file:./vendor/${TARBALL}';
            fs.writeFileSync('/tmp/forge-app/shared/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Regenerate lock file
          cd /tmp/forge-app/shared && npm install

          # Commit and push
          cd /tmp/forge-app
          git add shared/vendor/ shared/package.json shared/package-lock.json
          if git diff --cached --quiet; then
            echo "No changes — vendor already up to date."
            exit 0
          fi
          git commit -m "chore: bump @ssforge/routeiq-sdk vendor to ${VERSION}"
          git push \
            "https://x-access-token:${FORGE_TOKEN}@github.com/SSForge/forge-app.git" \
            main
