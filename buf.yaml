version: v2
modules:
  - path: proto
    name: buf.build/ssforge/routeiq
# deps added in Phase 3 when metrics protos import OTel and Google API protos
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    - ENUM_VALUE_PREFIX
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
